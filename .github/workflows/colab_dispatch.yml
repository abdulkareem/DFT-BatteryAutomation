name: Colab Job Dispatcher

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  create-job-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate 10 parallel job descriptors
        run: |
          mkdir -p manifests
          python - <<'PY'
          from pathlib import Path
          import json
          root = Path('manifests')
          for i in range(1, 11):
              payload = {
                  'job_id': f'Job_{i:02d}',
                  'drive_subfolder': f'/content/drive/My Drive/DFT_Project/Job_{i:02d}',
                  'colab_tag': f'colab-instance-{i:02d}',
              }
              (root / f'job_{i:02d}.json').write_text(json.dumps(payload, indent=2))
          print('Generated 10 unique job descriptors.')
          PY
      - name: Upload manifests
        uses: actions/upload-artifact@v4
        with:
          name: colab-job-manifests
          path: manifests/*.json

  monitor-status:
    runs-on: ubuntu-latest
    needs: create-job-manifest
    strategy:
      fail-fast: false
      matrix:
        job_idx: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10"]
    steps:
      - name: Status placeholder for ${{ matrix.job_idx }}
        run: |
          echo "Track Colab notebook run for Job_${{ matrix.job_idx }}"
          echo "Use unique Drive folder to avoid file-locking collisions."
